name: Daily Auto Commit

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 3:00 AM UTC
  workflow_dispatch:     # Lets you test manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo with RANI S <22f3000632@ds.study.iitm.ac.in>
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and commit update
        run: |
          echo "Daily update: $(date)" > status.txt
          git config user.name "DevSync Bot"
          git config user.email "22f3000632@ds.study.iitm.ac.in"
          git add status.txt
          git commit -m "Daily automated update by RANI S [$(date +%Y-%m-%d)]"
          git push
